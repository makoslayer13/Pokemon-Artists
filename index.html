<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Artist Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #14171f;
    --surface2:  #1c2030;
    --border:    #252a38;
    --accent:    #e8c84a;
    --accent2:   #4ae8a8;
    --accent3:   #e84a7a;
    --text:      #e8ecf5;
    --muted:     #6b738a;
    --owned-bg:  #0e2018;
    --owned-bdr: #1e5a35;
    --card-r:    12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* ── HEADER ── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between;
    gap: 1.5rem; position: sticky; top: 0; z-index: 100; height: 64px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 0.08em; color: var(--accent); white-space: nowrap; flex-shrink: 0; }
  .logo span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 1rem; flex: 1; justify-content: flex-end; }
  .search-wrap { position: relative; flex: 1; max-width: 420px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem 0.75rem 0.55rem 2.4rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color .15s; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }
  .stats-bar { display: flex; gap: 1.2rem; align-items: center; flex-shrink: 0; }
  .stat { text-align: center; line-height: 1.2; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.05em; }
  .stat-num.gold  { color: var(--accent); }
  .stat-num.green { color: var(--accent2); }
  .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  /* ── PROGRESS ── */
  .progress-section { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; gap: 2rem; align-items: center; }
  .progress-item { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 0; }
  .progress-label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; width: 70px; flex-shrink: 0; }
  .progress-bar-wrap { flex: 1; background: var(--bg); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .fill-yuka   { background: var(--accent); }
  .fill-shinji { background: var(--accent2); }
  .fill-asako  { background: var(--accent3); }
  .progress-pct { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text); width: 36px; text-align: right; flex-shrink: 0; }

  /* ── TOOLBAR ── */
  .toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.65rem 2rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 0.25rem; white-space: nowrap; }
  .chip { border: 1px solid var(--border); background: transparent; color: var(--muted); border-radius: 20px; padding: 0.3rem 0.85rem; font-size: 0.78rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #0d0f14; font-weight: 600; }
  .chip.artist-yuka.active   { background: #e8c84a; border-color: #e8c84a; }
  .chip.artist-shinji.active { background: #4ae8a8; border-color: #4ae8a8; }
  .chip.artist-asako.active  { background: #e84a7a; border-color: #e84a7a; }
  .sep { width: 1px; height: 20px; background: var(--border); margin: 0 0.25rem; flex-shrink: 0; }
  .sort-select, .set-select { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 0.3rem 0.65rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; outline: none; cursor: pointer; transition: border-color .15s; }
  .sort-select:focus, .set-select:focus { border-color: var(--accent); }
  .set-select { max-width: 200px; }
  .set-select option[data-era] { color: var(--muted); }
  .btn-mark-all { margin-left: auto; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 0.3rem 0.85rem; font-size: 0.78rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn-mark-all:hover { border-color: var(--accent2); color: var(--accent2); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; width: 30px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }
  .view-btn:hover { border-color: var(--accent); color: var(--accent); }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0f14; }

  /* ── MAIN ── */
  main { padding: 1.5rem 2rem; }
  .result-info { font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; font-family: 'DM Mono', monospace; }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }

  /* ── CARD ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); cursor: pointer; transition: transform .18s, border-color .15s, box-shadow .18s; position: relative; user-select: none; overflow: hidden; display: flex; flex-direction: column; }
  .card:hover { transform: translateY(-3px); border-color: var(--muted); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .card.owned { background: var(--owned-bg); border-color: var(--owned-bdr); }
  .card.owned:hover { border-color: var(--accent2); box-shadow: 0 8px 24px rgba(74,232,168,0.12); }
  .card-img-wrap { position: relative; width: 100%; aspect-ratio: 2.5 / 3.5; background: var(--bg); overflow: hidden; flex-shrink: 0; }
  .card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity .3s, transform .3s; opacity: 0; }
  .card-img.loaded { opacity: 1; }
  .card:hover .card-img.loaded { transform: scale(1.03); }
  .card-img-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--surface2); transition: opacity .3s; }
  .card-img-placeholder.hidden { opacity: 0; pointer-events: none; }
  .card-img-placeholder svg { opacity: 0.2; }
  .owned-overlay { position: absolute; inset: 0; background: rgba(74,232,168,0.18); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .card.owned .owned-overlay { opacity: 1; }
  .owned-overlay-check { width: 48px; height: 48px; border-radius: 50%; background: var(--accent2); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(74,232,168,0.5); }
  .artist-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 2; }
  .ab-yuka   { background: var(--accent); }
  .ab-shinji { background: var(--accent2); }
  .ab-asako  { background: var(--accent3); }
  .card-info { padding: 0.65rem 0.75rem 0.7rem; display: flex; flex-direction: column; gap: 0.3rem; flex: 1; }
  .card-name { font-weight: 600; font-size: 0.85rem; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-set-row { display: flex; align-items: center; justify-content: space-between; gap: 0.25rem; }
  .card-set { font-size: 0.72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .card-num { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); opacity: 0.65; white-space: nowrap; }
  .card-footer-row { display: flex; align-items: center; justify-content: space-between; margin-top: 0.2rem; }
  .artist-tag { font-size: 0.64rem; padding: 0.15rem 0.45rem; border-radius: 20px; font-weight: 500; letter-spacing: 0.03em; white-space: nowrap; }
  .artist-yuka   { background: rgba(232,200,74,0.15);  color: #e8c84a; }
  .artist-shinji { background: rgba(74,232,168,0.15);  color: #4ae8a8; }
  .artist-asako  { background: rgba(232,74,122,0.15);  color: #e84a7a; }
  .hp-tag { font-family: 'DM Mono', monospace; font-size: 0.67rem; color: var(--muted); }
  .serebii-link { font-size: 0.64rem; color: var(--muted); text-decoration: none; opacity: 0.55; transition: opacity .15s, color .15s; display: flex; align-items: center; gap: 2px; }
  .serebii-link:hover { opacity: 1; color: var(--accent); }

  /* ── LIST VIEW ── */
  body.list-view .grid { display: flex; flex-direction: column; gap: 0; }
  body.list-view .card { flex-direction: row; border-radius: 0; border-left: none; border-right: none; border-top: none; border-bottom: 1px solid var(--border); }
  body.list-view .card:first-child { border-top: 1px solid var(--border); border-radius: 8px 8px 0 0; }
  body.list-view .card:last-child { border-radius: 0 0 8px 8px; }
  body.list-view .card:hover { transform: none; box-shadow: none; background: var(--surface2); }
  body.list-view .card.owned:hover { background: #112819; }
  body.list-view .card-img-wrap { width: 54px; aspect-ratio: unset; height: 76px; flex-shrink: 0; border-radius: 0; }
  body.list-view .artist-bar { top: 0; left: 0; right: unset; bottom: 0; width: 3px; height: 100%; }
  body.list-view .card-info { flex-direction: row; align-items: center; padding: 0 1rem; gap: 1rem; flex: 1; }
  body.list-view .card-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 160px; flex-shrink: 0; }
  body.list-view .card-set { font-size: 0.78rem; flex: 1; }
  body.list-view .card-set-row { flex: 1; gap: 0.5rem; }
  body.list-view .card-footer-row { flex-shrink: 0; gap: 1rem; }
  body.list-view .owned-overlay { border-radius: 0; }
  body.list-view .owned-overlay-check { width: 28px; height: 28px; }
  body.list-view .owned-overlay-check svg { width: 14px; height: 14px; }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 5rem 2rem; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.05em; margin-bottom: 0.5rem; color: var(--text); }

  /* ── LIGHTBOX ── */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .lightbox.open { display: flex; }
  .lightbox-inner { display: flex; gap: 2rem; align-items: flex-start; max-width: 740px; width: 100%; padding: 2rem; position: relative; max-height: 90vh; overflow-y: auto; }
  .lightbox-img-wrap { flex-shrink: 0; width: 240px; }
  .lightbox-img { width: 100%; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); display: block; }
  .lightbox-details { flex: 1; padding-top: 0.25rem; }
  .lb-name { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.05em; line-height: 1.1; margin-bottom: 0.35rem; }
  .lb-set-block { margin-bottom: 1rem; }
  .lb-set-name { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
  .lb-era-badge { display: inline-block; font-size: 0.68rem; padding: 0.2rem 0.6rem; border-radius: 20px; background: rgba(232,200,74,0.12); color: var(--accent); border: 1px solid rgba(232,200,74,0.25); font-weight: 500; letter-spacing: 0.04em; }
  .lb-divider { height: 1px; background: var(--border); margin: 0.85rem 0; }
  .lb-meta { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1.2rem; }
  .lb-row { display: flex; gap: 0.75rem; font-size: 0.82rem; align-items: center; }
  .lb-label { color: var(--muted); width: 75px; flex-shrink: 0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .lb-val { color: var(--text); }
  .lb-artist-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
  .lb-toggle { width: 100%; padding: 0.75rem; border-radius: 8px; border: 2px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all .2s; margin-bottom: 0.75rem; }
  .lb-toggle:hover { border-color: var(--accent2); color: var(--accent2); }
  .lb-toggle.owned-btn { background: var(--owned-bg); border-color: var(--owned-bdr); color: var(--accent2); }
  .lb-toggle.owned-btn:hover { border-color: var(--accent3); color: var(--accent3); background: #2a0d15; }
  .lb-serebii { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.78rem; color: var(--muted); text-decoration: none; transition: color .15s; }
  .lb-serebii:hover { color: var(--accent); }
  /* Set siblings in lightbox */
  .lb-siblings { margin-top: 1rem; }
  .lb-siblings-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .lb-siblings-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .lb-sibling { font-size: 0.72rem; padding: 0.2rem 0.55rem; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; transition: all .15s; background: transparent; font-family: 'DM Sans', sans-serif; }
  .lb-sibling:hover { border-color: var(--accent); color: var(--accent); }
  .lb-sibling.current { border-color: var(--accent); color: var(--accent); background: rgba(232,200,74,0.08); font-weight: 600; }
  .lightbox-close { position: absolute; top: 1rem; right: 1rem; background: var(--surface); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; transition: all .15s; }
  .lightbox-close:hover { background: var(--surface2); color: var(--text); border-color: var(--muted); }

  /* ── SET FILTER DROPDOWN custom styling ── */
  .set-filter-wrap { position: relative; }

  @media (max-width: 700px) {
    header { padding: 0 1rem; }
    .toolbar { padding: 0.65rem 1rem; }
    main { padding: 1rem; }
    .stats-bar { gap: 0.75rem; }
    .progress-section { flex-direction: column; gap: 0.5rem; padding: 0.75rem 1rem; }
    .progress-item { width: 100%; }
    .logo { font-size: 1.3rem; }
    .lightbox-inner { flex-direction: column; align-items: center; padding: 1.5rem 1rem; }
    .lightbox-img-wrap { width: 180px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.65rem; }
    .set-select { max-width: 140px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">TCG<span>Tracker</span></div>
  <div class="header-right">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search cards, sets, artists, eras…" autocomplete="off">
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num gold" id="stat-owned">0</div><div class="stat-label">Owned</div></div>
      <div class="stat"><div class="stat-num" id="stat-total">213</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num green" id="stat-pct">0%</div><div class="stat-label">Complete</div></div>
    </div>
  </div>
</header>

<div class="progress-section">
  <div class="progress-item">
    <div class="progress-label" style="color:#e8c84a;">Yuka Morii</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill fill-yuka" id="bar-yuka" style="width:0%"></div></div>
    <div class="progress-pct" id="pct-yuka">0%</div>
  </div>
  <div class="progress-item">
    <div class="progress-label" style="color:#4ae8a8;">Shinji Kanda</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill fill-shinji" id="bar-shinji" style="width:0%"></div></div>
    <div class="progress-pct" id="pct-shinji">0%</div>
  </div>
  <div class="progress-item">
    <div class="progress-label" style="color:#e84a7a;">Asako Ito</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill fill-asako" id="bar-asako" style="width:0%"></div></div>
    <div class="progress-pct" id="pct-asako">0%</div>
  </div>
</div>

<div class="toolbar">
  <span class="filter-label">Artist</span>
  <button class="chip active" data-artist="all">All</button>

  <div class="sep"></div>
  <span class="filter-label">Status</span>
  <button class="chip active" data-owned="all">All</button>
  <button class="chip" data-owned="owned">Owned</button>
  <button class="chip" data-owned="missing">Missing</button>
  <div class="sep"></div>
  <span class="filter-label">Set</span>
  <select class="set-select" id="set-filter">
    <option value="all">All Sets</option>
    <optgroup label="── Scarlet &amp; Violet Era">

      <option value="Phantasmal Flames">Phantasmal Flames</option>

// ── IMAGE URL ────────────────────────────────────────────────────────────────
function remoteImageUrl(shtml) {
  if (SCRYDEX_OVERRIDES[shtml]) return SCRYDEX_OVERRIDES[shtml];
  const jpg = shtml.replace('.shtml', '.jpg');
  return jpg.replace(/\/([0-9]+)\.jpg$/, (_, n) => '/' + parseInt(n, 10) + '.jpg');
}
function imageUrl(shtml) {
  const remote = remoteImageUrl(shtml);
  return IMG_MAP[remote] || remote;
}

// ── STATE ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'tcg_owned_v1';
let cards = RAW.map(c => ({...c}));
let artistFilter = 'all';
let ownedFilter  = 'all';
let setFilter    = 'all';
let sortMode     = 'name';
let searchQ      = '';
let viewMode     = 'grid';
let visibleIds   = [];
let lightboxId   = null;

function loadOwned() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    cards.forEach(c => { if (saved[c.id]) c.owned = true; });
  } catch(e) {}
}
function saveOwned() {
  const obj = {};
  cards.forEach(c => { if (c.owned) obj[c.id] = true; });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
}

function artistSlug(a) {
  if (a === 'Yuka Morii')   return 'yuka';
  if (a === 'Shinji Kanda') return 'shinji';
  return 'asako';
}

function artistColor(a) {
  if (a === 'Yuka Morii')   return '#e8c84a';
  if (a === 'Shinji Kanda') return '#4ae8a8';
  return '#e84a7a';
}

// ── FILTER + SORT ─────────────────────────────────────────────────────────────
function getFiltered() {
  let list = cards.filter(c => {
    if (artistFilter !== 'all' && c.artist !== artistFilter) return false;
    if (ownedFilter  === 'owned'   && !c.owned) return false;
    if (ownedFilter  === 'missing' &&  c.owned) return false;
    if (setFilter    !== 'all'  && c['Set Name'] !== setFilter) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      const era = (ERA_MAP[c['Set Name']] || '').toLowerCase();
      if (!c['Card Name'].toLowerCase().includes(q) &&
          !c['Set Name'].toLowerCase().includes(q)  &&
          !c.artist.toLowerCase().includes(q)        &&
          !c['Card Number'].toLowerCase().includes(q) &&
          !era.includes(q)) return false;
    }
    return true;
  });
  list.sort((a, b) => {
    switch(sortMode) {
      case 'name':    return a['Card Name'].localeCompare(b['Card Name']);
      case 'set':     return a['Set Name'].localeCompare(b['Set Name']) || a['Card Name'].localeCompare(b['Card Name']);
      case 'artist':  return a.artist.localeCompare(b.artist) || a['Card Name'].localeCompare(b['Card Name']);
      case 'hp-desc': return (parseInt(b.HP)||0) - (parseInt(a.HP)||0);
      case 'hp-asc':  return (parseInt(a.HP)||0) - (parseInt(b.HP)||0);
    }
    return 0;
  });
  return list;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const list = getFiltered();
  visibleIds = list.map(c => c.id);
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const info  = document.getElementById('result-info');
  if (list.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    info.textContent = '';
  } else {
    empty.style.display = 'none';
    info.textContent = `Showing ${list.length} of ${cards.length} cards`;
    grid.innerHTML = list.map(c => cardHTML(c)).join('');
    grid.querySelectorAll('.card-img').forEach(img => {
      if (img.dataset.src) {
        img.src = img.dataset.src;
        img.onload  = () => {
          img.classList.add('loaded');
          img.closest('.card-img-wrap').querySelector('.card-img-placeholder').classList.add('hidden');
        };
        img.onerror = () => {
          const remote = img.dataset.remote;
          if (remote && img.src !== remote) { img.src = remote; }
          else { img.style.display = 'none'; }
        };
      }
    });
  }
  updateStats();
}

function cardHTML(c) {
  const slug    = artistSlug(c.artist);
  const numDisp = c['Set Total'] ? `${c['Card Number']} / ${c['Set Total']}` : c['Card Number'];
  const imgSrc  = imageUrl(c.URL);
  const era     = ERA_MAP[c['Set Name']] || '';
  return `<div class="card${c.owned ? ' owned' : ''}" data-id="${c.id}" title="${c['Card Name']} · ${c['Set Name']}">
    <div class="card-img-wrap">
      <div class="artist-bar ab-${slug}"></div>
      <div class="card-img-placeholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <img class="card-img" data-src="${imgSrc}" alt="${c['Card Name']}" loading="lazy" data-remote="${remoteImageUrl(c.URL)}">
      <div class="owned-overlay">
        <div class="owned-overlay-check">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0d0f14" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
    </div>
    <div class="card-info">
      <div class="card-name">${c['Card Name']}</div>
      <div class="card-set-row">
        <div class="card-set">${c['Set Name']}</div>
        <div class="card-num">${numDisp}</div>
      </div>
      <div class="card-footer-row">
        <span class="artist-tag artist-${slug}">${c.artist}</span>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          ${c.HP ? `<span class="hp-tag">${c.HP}</span>` : ''}
          <a class="serebii-link" href="${c.URL}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
        </div>
      </div>
    </div>
  </div>`;
}

function updateStats() {
  const owned = cards.filter(c => c.owned).length;
  const total = cards.length;
  const pct   = total ? Math.round(owned/total*100) : 0;
  document.getElementById('stat-owned').textContent = owned;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pct').textContent   = pct + '%';
  ['Yuka Morii','Shinji Kanda','Asako Ito'].forEach(artist => {
    const slug = artistSlug(artist);
    const all  = cards.filter(c => c.artist === artist);
    const own  = all.filter(c => c.owned).length;
    const p    = all.length ? Math.round(own/all.length*100) : 0;
    document.getElementById(`bar-${slug}`).style.width = p + '%';
    document.getElementById(`pct-${slug}`).textContent = p + '%';
  });
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
function openLightbox(id) {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  lightboxId = id;
  const era = ERA_MAP[c['Set Name']] || 'Unknown Era';

  // Image
  const lbImg = document.getElementById('lb-img');
  lbImg.src = imageUrl(c.URL);
  lbImg.onerror = () => { const rem = remoteImageUrl(c.URL); if (lbImg.src !== rem) lbImg.src = rem; };

  // Text fields
  document.getElementById('lb-name').textContent     = c['Card Name'];
  document.getElementById('lb-set-name').textContent = c['Set Name'];
  document.getElementById('lb-era-badge').textContent = era;
  document.getElementById('lb-num').textContent =
    c['Set Total'] ? `${c['Card Number']} / ${c['Set Total']}` : c['Card Number'];
  document.getElementById('lb-hp').textContent       = c.HP || '—';
  document.getElementById('lb-link').href            = c.URL;

  // Artist row with colored dot
  document.getElementById('lb-artist-row').innerHTML =
    `<span class="lb-artist-dot" style="background:${artistColor(c.artist)}"></span>${c.artist}`;

  // Siblings — other cards from the same set
  const siblings = cards.filter(x => x['Set Name'] === c['Set Name']).sort((a,b) => a['Card Name'].localeCompare(b['Card Name']));
  const wrap = document.getElementById('lb-siblings-wrap');
  const grid = document.getElementById('lb-siblings-grid');
  if (siblings.length > 1) {
    grid.innerHTML = siblings.map(s =>
      `<button class="lb-sibling${s.id === id ? ' current' : ''}" data-id="${s.id}">${s['Card Name']}${s.owned ? ' ✓' : ''}</button>`
    ).join('');
    wrap.style.display = '';
  } else {
    wrap.style.display = 'none';
  }

  updateLbToggle(c);
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateLbToggle(c) {
  const btn = document.getElementById('lb-toggle');
  if (c.owned) { btn.textContent = '✓ Owned — Click to Unmark'; btn.classList.add('owned-btn'); }
  else         { btn.textContent = 'Mark as Owned';              btn.classList.remove('owned-btn'); }
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  lightboxId = null;
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// Sibling click
document.getElementById('lb-siblings-grid').addEventListener('click', e => {
  const btn = e.target.closest('.lb-sibling');
  if (!btn) return;
  openLightbox(parseInt(btn.dataset.id));
});

document.getElementById('lb-toggle').addEventListener('click', () => {
  if (lightboxId === null) return;
  const c = cards.find(x => x.id === lightboxId);
  if (!c) return;
  c.owned = !c.owned;
  saveOwned();
  updateLbToggle(c);
  const gridCard = document.querySelector(`.card[data-id="${lightboxId}"]`);
  if (gridCard) gridCard.classList.toggle('owned', c.owned);
  // Refresh sibling buttons to update checkmarks
  document.querySelectorAll('.lb-sibling').forEach(btn => {
    const sid = parseInt(btn.dataset.id);
    const sc  = cards.find(x => x.id === sid);
    if (sc) btn.textContent = sc['Card Name'] + (sc.owned ? ' ✓' : '');
  });
  updateStats();
  if (ownedFilter !== 'all') setTimeout(render, 300);
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── GRID CLICK → lightbox ─────────────────────────────────────────────────────
let clickStartTime = 0;
document.getElementById('grid').addEventListener('mousedown', () => { clickStartTime = Date.now(); });
document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  if (e.target.closest('a')) return;
  const id = parseInt(card.dataset.id);
  if (Date.now() - clickStartTime < 200) openLightbox(id);
});

// ── TOOLBAR EVENTS ────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});
document.querySelectorAll('[data-artist]').forEach(btn => {
  btn.addEventListener('click', () => {
    artistFilter = btn.dataset.artist;
    document.querySelectorAll('[data-artist]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});
document.querySelectorAll('[data-owned]').forEach(btn => {
  btn.addEventListener('click', () => {
    ownedFilter = btn.dataset.owned;
    document.querySelectorAll('[data-owned]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});
document.getElementById('set-filter').addEventListener('change', e => {
  setFilter = e.target.value;
  render();
});
document.getElementById('sort').addEventListener('change', e => {
  sortMode = e.target.value;
  render();
});
document.getElementById('btn-grid').addEventListener('click', () => {
  viewMode = 'grid';
  document.body.classList.remove('list-view');
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
});
document.getElementById('btn-list').addEventListener('click', () => {
  viewMode = 'list';
  document.body.classList.add('list-view');
  document.getElementById('btn-list').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
});
document.getElementById('btn-mark-visible').addEventListener('click', () => {
  const allOwned = visibleIds.every(id => cards.find(c => c.id === id)?.owned);
  visibleIds.forEach(id => { const c = cards.find(x => x.id === id); if (c) c.owned = !allOwned; });
  saveOwned();
  render();
  const btn = document.getElementById('btn-mark-visible');
  const orig = btn.textContent;
  btn.textContent = allOwned ? '✗ Unmarked visible' : '✓ Marked visible!';
  setTimeout(() => btn.textContent = orig, 1500);
});

// ── INIT ──────────────────────────────────────────────────────────────────────
loadOwned();
render();
</script>
</body>
</html>
